STR_EXPANSION_GARAGE_INFO_GROUP_STOREANDRETRIEVE = - Todos os membros do seu grupo podem armazenar e recuperar seus veículos quando estiverem perto de um ponto de acesso à garagem.
STR_EXPANSION_GARAGE_INFO_KEY = - Os veículos precisam de uma chave emparelhada vinculada a eles para serem armazenados.
STR_EXPANSION_GARAGE_INFO_PRICE = - Armazenar um veículo custará o valor exibido na entrada do veículo.
STR_EXPANSION_GARAGE_INFO_RAIDING = - Os veículos podem ser recuperados por outros jogadores se eles obtiverem acesso a um ponto de acesso à garagem dentro de um território.
STR_EXPANSION_GARAGE_INFO_RETRIEVE = - Os veículos são recuperados exatamente na mesma posição em que estão armazenados.
STR_EXPANSION_GARAGE_INFO_STORE = - Armazene veículos para protegê-los durante reinicializações, de ladrões e insetos DayZ.
