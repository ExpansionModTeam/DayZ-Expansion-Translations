STR_EXPANSION_GARAGE_INFO_CARGO = - Veículos com itens em sua carga não poderão ser armazenados.
STR_EXPANSION_GARAGE_INFO_GROUP_RETRIEVE = - Todos os membros do seu grupo podem recuperar seus veículos quando estiverem perto de um ponto de acesso à garagem.
